#──────────────────────────────────────────────────────────────
# HAProxy 설정
# 역할: 외부 트래픽 수신 → nginx 서비스로 L7 로드밸런싱
#──────────────────────────────────────────────────────────────

global
    log         stdout format raw local0 info
    maxconn     10000
    daemon

defaults
    log         global
    mode        http
    option      httplog
    option      dontlognull
    option      forwardfor
    option      http-server-close
    timeout connect 5s
    timeout client  50s
    timeout server  50s
    retries     3
    errorfile   503 /usr/local/etc/haproxy/errors/503.http

#──────────────────────────────────────────────────────────────
# Frontend: 외부 HTTP 진입점
#──────────────────────────────────────────────────────────────
frontend http_in
    bind *:80
    option      httplog
    capture     request header Host len 32

    # 간단한 ACL 예시 (필요 시 확장)
    # acl is_api path_beg /api
    # use_backend api_direct if is_api

    default_backend nginx_backend

#──────────────────────────────────────────────────────────────
# Backend: Nginx 서비스 (Docker Swarm VIP로 자동 분산)
#──────────────────────────────────────────────────────────────
backend nginx_backend
    balance     roundrobin
    option      httpchk GET /nginx-status

    # Docker 내부 DNS (127.0.0.11) 를 통해 Swarm 서비스 DNS 조회
    server-template nginx 1-5 nginx:80 check resolvers docker resolve-prefer ipv4 init-addr none

    http-check  expect status 200
    timeout     connect 5s
    timeout     server  30s

#──────────────────────────────────────────────────────────────
# Stats 페이지: http://<host>:8404/stats
#──────────────────────────────────────────────────────────────
frontend stats
    bind        *:8404
    stats       enable
    stats       uri     /stats
    stats       refresh 10s
    stats       show-node
    stats       auth    admin:admin123    # 기본 인증
    stats       admin   if TRUE

#──────────────────────────────────────────────────────────────
# DNS 리졸버 (Docker Swarm 내부 DNS)
#──────────────────────────────────────────────────────────────
resolvers docker
    nameserver  dns1 127.0.0.11:53
    resolve_retries   3
    timeout resolve   1s
    timeout retry     1s
    hold other        30s
    hold refused      30s
    hold nx           30s
    hold timeout      30s
    hold valid        10s
    hold obsolete     30s
